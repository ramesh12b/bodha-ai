<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BODHA · Neural Wisdom · Ancient Soul</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Noto+Serif+Devanagari:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   SPIRITUAL COLOUR SYSTEM
   Temple lamp gold · Amethyst wisdom ·
   Sacred saffron · Lotus compassion ·
   Moonlight reading · Deep cosmos bg
══════════════════════════════════════ */
:root {
  --bg:          #0B0918;
  --bg2:         #110E24;
  --bg3:         #18143A;
  --card:        rgba(22, 17, 46, 0.75);
  --card-hover:  rgba(80, 55, 130, 0.10);

  --gold:        #D4A84B;
  --gold-lt:     #F2C76E;
  --gold-dim:    rgba(212,168,75,0.14);
  --gold-glow:   rgba(212,168,75,0.26);

  --saffron:     #E8821E;
  --saffron-dim: rgba(232,130,30,0.14);

  --lotus:       #C97BAC;
  --lotus-dim:   rgba(201,123,172,0.14);

  --amethyst:    #8B65CC;
  --amethyst-dim:rgba(139,101,204,0.16);

  --moon:        #EDE8F8;
  --moon-75:     rgba(237,232,248,0.75);
  --moon-45:     rgba(237,232,248,0.45);
  --moon-25:     rgba(237,232,248,0.25);

  --border:      rgba(212,168,75,0.15);
  --border-hi:   rgba(212,168,75,0.40);
  --border-fo:   rgba(212,168,75,0.60);

  --r-lg: 26px;
  --r-md: 16px;
  --r-sm: 10px;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px}

body{
  background:var(--bg);
  color:var(--moon);
  font-family:'Cormorant Garamond',Georgia,serif;
  overflow-x:hidden;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  line-height:1.7;
}

/* ─── BACKGROUNDS ─── */
.bg-cosmos{
  position:fixed;inset:0;z-index:-3;
  background:
    radial-gradient(ellipse 65% 50% at 15% 8%,  #201050 0%,transparent 55%),
    radial-gradient(ellipse 55% 65% at 88% 92%,  #1a0e0c 0%,transparent 50%),
    radial-gradient(ellipse 100% 100% at 50% 50%, #110E24 0%,#0B0918 100%);
}
#star-canvas{
  position:fixed;inset:0;z-index:-2;
  pointer-events:none;opacity:.55;
}
.bg-yantra{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:min(90vw,660px);aspect-ratio:1;
  opacity:.03;z-index:-1;
  animation:y-spin 160s linear infinite;
  pointer-events:none;
}
@keyframes y-spin{to{transform:translate(-50%,-50%) rotate(360deg)}}

/* ─── NAV ─── */
nav{
  position:fixed;top:0;width:100%;z-index:900;
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 6%;
  background:rgba(11,9,24,0.72);
  backdrop-filter:blur(22px) saturate(1.5);
  border-bottom:1px solid var(--border);
}
.logo{
  font-family:'Cinzel Decorative',serif;
  font-size:22px;letter-spacing:7px;
  color:var(--gold);
  text-shadow:0 0 28px var(--gold-glow);
}
.nav-r{display:flex;align-items:center;gap:10px}
.status-dot{
  width:7px;height:7px;border-radius:50%;
  background:#72E09A;box-shadow:0 0 9px #72E09A;
  animation:s-pulse 2.4s ease infinite;
}
@keyframes s-pulse{0%,100%{opacity:.35;transform:scale(.7)}50%{opacity:1;transform:scale(1.2)}}
.nav-tag{
  font-size:11px;letter-spacing:3px;
  color:var(--moon-25);font-style:italic;
}

/* ─── LAYOUT ─── */
main{
  display:grid;
  grid-template-columns:1fr 1.18fr;
  gap:34px;
  padding:118px 6% 64px;
  max-width:1440px;margin:0 auto;
  min-height:100vh;
  align-items:start;
}

/* ─── LEFT ─── */
.left{
  display:flex;flex-direction:column;gap:26px;
  position:sticky;top:108px;
}
.headline{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(30px,3.4vw,50px);
  line-height:1.25;letter-spacing:.5px;
  background:linear-gradient(145deg,var(--moon) 20%,var(--gold) 58%,var(--saffron) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:10px;
}
.subline{
  font-size:18px;font-weight:300;font-style:italic;
  color:var(--moon-45);line-height:1.85;max-width:380px;
}

/* ─── CARD ─── */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--r-lg);
  padding:32px 34px;
  backdrop-filter:blur(32px);
  box-shadow:0 28px 60px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.04);
  transition:border-color .35s;
}
.card:focus-within{border-color:var(--border-fo)}

.inp-lbl{
  display:block;
  font-size:11px;letter-spacing:4px;text-transform:uppercase;
  color:var(--gold);font-style:italic;
  margin-bottom:16px;
}

.q-box{
  width:100%;background:transparent;border:none;
  border-bottom:1px solid rgba(237,232,248,.12);
  color:var(--moon);
  font-family:'Cormorant Garamond',serif;
  font-size:20px;font-weight:400;line-height:1.65;
  padding:10px 0 14px;
  outline:none;resize:none;min-height:88px;
  transition:border-color .35s;
}
.q-box::placeholder{color:var(--moon-25);font-style:italic}
.q-box:focus{border-bottom-color:var(--gold)}

.chips{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0 20px}
.chip{
  padding:7px 15px;
  border:1px solid var(--border);border-radius:50px;
  font-family:'Cormorant Garamond',serif;
  font-size:14px;font-style:italic;
  color:var(--moon-45);cursor:pointer;
  transition:all .28s;white-space:nowrap;
  user-select:none;
}
.chip:hover{border-color:var(--gold);color:var(--gold);background:var(--gold-dim);transform:translateY(-1px)}

.err-box{
  font-size:14px;color:#F08080;font-style:italic;
  padding:10px 14px;margin-bottom:14px;
  background:rgba(240,128,128,.08);
  border:1px solid rgba(240,128,128,.2);
  border-radius:var(--r-sm);
  display:none;
}

.btn-invoke{
  width:100%;border:none;cursor:pointer;
  background:linear-gradient(135deg,#b07018,var(--gold),#cc8828);
  color:#160E04;
  font-family:'Cinzel Decorative',serif;
  font-size:11px;font-weight:700;letter-spacing:5px;text-transform:uppercase;
  padding:20px 28px;border-radius:50px;
  box-shadow:0 10px 34px var(--gold-glow);
  transition:all .35s;position:relative;overflow:hidden;
}
.btn-invoke::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(118deg,transparent 32%,rgba(255,255,255,.22) 50%,transparent 68%);
  transform:translateX(-130%);transition:transform .55s;
}
.btn-invoke:not(:disabled):hover::after{transform:translateX(130%)}
.btn-invoke:not(:disabled):hover{transform:translateY(-3px);box-shadow:0 18px 48px var(--gold-glow)}
.btn-invoke:not(:disabled):active{transform:translateY(-1px)}
.btn-invoke:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}

/* ─── HISTORY ─── */
#hist-wrap{display:none}
.hist-lbl{font-size:11px;letter-spacing:4px;color:var(--moon-25);font-style:italic;text-transform:uppercase;margin-bottom:10px}
.hist-list{display:flex;flex-direction:column;gap:7px}
.hist-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;
  border:1px solid var(--border);border-radius:var(--r-sm);
  cursor:pointer;font-size:16px;color:var(--moon-45);font-style:italic;
  transition:all .28s;
}
.hist-item:hover{border-color:var(--border-hi);color:var(--moon-75);background:var(--card-hover)}
.hist-dot{width:5px;height:5px;border-radius:50%;background:var(--lotus);flex-shrink:0}

/* ─── VIEWPORT ─── */
.viewport{
  position:relative;
  border-radius:34px;overflow:hidden;
  border:1px solid var(--border);
  background:var(--bg2);
  min-height:640px;
  display:flex;align-items:center;justify-content:center;
}
#art{
  position:absolute;inset:0;
  width:100%;height:100%;object-fit:cover;
  opacity:0;transition:opacity 2s ease;
}

/* idle */
#idle-scr{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
  transition:opacity .7s;pointer-events:none;
}
#idle-scr svg{width:180px;opacity:.22;animation:y-spin 80s linear infinite}
#idle-scr p{font-size:11px;letter-spacing:5px;color:var(--moon-25);font-style:italic;text-transform:uppercase}

/* loader */
#loader{
  position:absolute;inset:0;z-index:20;
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:22px;
  background:rgba(11,9,24,.5);backdrop-filter:blur(5px);border-radius:34px;
}
.l-ring svg{width:72px;height:72px;animation:y-spin 3.2s linear infinite}
.l-txt{
  font-size:11px;letter-spacing:5px;color:var(--gold);
  font-style:italic;text-transform:uppercase;
  animation:breathe 2.2s ease infinite;
}
@keyframes breathe{0%,100%{opacity:.38}50%{opacity:1}}

/* result overlay */
.result-ov{
  position:absolute;bottom:0;left:0;right:0;
  padding:0 36px 34px;
  max-height:100%;overflow-y:auto;
  background:linear-gradient(0deg,
    rgba(11,9,24,.98) 0%,
    rgba(11,9,24,.95) 38%,
    rgba(11,9,24,.68) 68%,
    transparent 100%);
  transform:translateY(14px);opacity:0;
  transition:all .7s cubic-bezier(.16,1,.3,1);
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;
}
.result-ov::-webkit-scrollbar{width:3px}
.result-ov::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.result-ov.on{transform:translateY(0);opacity:1}

/* shloka */
.shloka-card{
  border-left:3px solid var(--saffron);
  padding:16px 20px;margin-bottom:20px;
  background:var(--saffron-dim);
  border-radius:0 var(--r-sm) var(--r-sm) 0;
}
.shloka-txt{
  font-family:'Noto Serif Devanagari',serif;
  font-size:24px;font-weight:500;
  color:#FFAA55;line-height:1.9;
  text-shadow:0 0 20px rgba(255,170,85,.18);
  margin-bottom:8px;
}
.shloka-src{
  font-size:13px;color:var(--moon-25);
  font-style:italic;letter-spacing:1.5px;
}

/* insight */
.ins-lbl{
  font-size:11px;letter-spacing:4px;
  color:var(--lotus);text-transform:uppercase;font-style:italic;
  margin-bottom:10px;
}
.ins-body{
  font-size:19px;font-weight:300;font-style:italic;
  color:var(--moon-75);line-height:1.95;
}
.ins-body strong{color:var(--gold-lt);font-weight:500;font-style:normal}

/* cursor */
.caret{
  display:inline-block;width:2px;height:1.05em;
  background:var(--gold);margin-left:2px;
  animation:ca-blink .75s step-end infinite;
  vertical-align:text-bottom;
}
@keyframes ca-blink{50%{opacity:0}}

/* actions */
.act-row{display:none;gap:10px;margin-top:18px;flex-wrap:wrap}
.act-btn{
  display:inline-flex;align-items:center;gap:7px;
  padding:9px 18px;
  border:1px solid var(--border);border-radius:50px;
  background:transparent;color:var(--moon-45);
  font-family:'Cormorant Garamond',serif;
  font-size:14px;font-style:italic;letter-spacing:.5px;
  cursor:pointer;transition:all .28s;
}
.act-btn:hover{border-color:var(--border-hi);color:var(--moon);background:var(--card-hover)}
.act-btn svg{width:13px;height:13px;flex-shrink:0}

/* ─── FOOTER ─── */
footer{
  text-align:center;padding:26px 6%;
  font-size:11px;letter-spacing:4px;
  color:var(--moon-25);font-style:italic;
  border-top:1px solid var(--border);
}

/* ─── RESPONSIVE ─── */
@media(max-width:1060px){
  main{grid-template-columns:1fr;padding-top:96px}
  .left{position:static}
  .viewport{min-height:520px}
  .shloka-txt{font-size:22px}
}
@media(max-width:600px){
  nav{padding:16px 5%}
  .logo{font-size:18px;letter-spacing:5px}
  main{padding:88px 5% 48px;gap:24px}
  .card{padding:22px 20px}
  .result-ov{padding:0 22px 26px}
  .shloka-txt{font-size:20px}
  .ins-body{font-size:17px}
}
</style>
</head>

<script>
'use strict';

/* ══════ STAR CANVAS ══════ */
(function(){
  const C = document.getElementById('star-canvas');
  const ctx = C.getContext('2d');
  let S = [];
  function resize(){
    C.width = window.innerWidth; C.height = window.innerHeight;
    S = Array.from({length:220}, () => ({
      x: Math.random()*C.width, y: Math.random()*C.height,
      r: Math.random()*.85+.15,
      a: Math.random(), da: (Math.random()-.5)*.0042,
      purple: Math.random() > .82
    }));
  }
  function draw(){
    ctx.clearRect(0,0,C.width,C.height);
    S.forEach(s => {
      s.a += s.da;
      if(s.a < .04 || s.a > 1) s.da *= -1;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fillStyle = s.purple
        ? `rgba(175,145,230,${s.a*.65})`
        : `rgba(212,168,75,${s.a})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  resize(); draw();
  window.addEventListener('resize', resize);
})();

/* ══════ CHIPS ══════ */
const CHIPS = [
  'Om Namah Shivaya',
  'What is Moksha?',
  "Arjuna's doubt",
  'Brahman and Atman',
  'Gayatri Mantra',
  'Dharma in Kali Yuga',
  'What is Maya?',
  'Path of Bhakti Yoga'
];
(function buildChips(){
  const row = document.getElementById('chips-row');
  CHIPS.forEach(txt => {
    const el = document.createElement('div');
    el.className = 'chip';
    el.textContent = txt;
    el.setAttribute('role','button');
    el.setAttribute('tabindex','0');
    function go(){ document.getElementById('q').value = txt; invoke(); }
    el.addEventListener('click', go);
    el.addEventListener('keydown', e => { if(e.key==='Enter') go(); });
    row.appendChild(el);
  });
})();

/* ══════ HISTORY — avoid window.history collision ══════ */
const queryHist = [];
function pushHistory(q){
  if(queryHist.includes(q)) return;
  queryHist.unshift(q);
  if(queryHist.length > 5) queryHist.pop();
  const wrap = document.getElementById('hist-wrap');
  const list = document.getElementById('hist-list');
  wrap.style.display = 'block';
  list.innerHTML = '';
  queryHist.forEach(h => {
    const el = document.createElement('div');
    el.className = 'hist-item';
    el.innerHTML = '<div class="hist-dot"></div><span>' + safe(h) + '</span>';
    el.addEventListener('click', () => { document.getElementById('q').value = h; invoke(); });
    list.appendChild(el);
  });
}
function safe(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ══════ KEY HANDLER ══════ */
function handleKey(e){
  if((e.ctrlKey||e.metaKey) && e.key==='Enter'){ e.preventDefault(); invoke(); }
}

/* ══════ STATE ══════ */
let storedShloka = '', storedSource = '', storedInsight = '';
let running = false;

/* ══════ INVOKE ══════ */
async function invoke(){
  const q = document.getElementById('q').value.trim();
  if(!q || running) return;
  running = true;

  const btn    = document.getElementById('invoke-btn');
  const loader = document.getElementById('loader');
  const result = document.getElementById('result');
  const art    = document.getElementById('art');
  const idle   = document.getElementById('idle-scr');
  const errBox = document.getElementById('err-box');
  const actRow = document.getElementById('act-row');

  btn.disabled = true;
  errBox.style.display = 'none';
  result.classList.remove('on');
  art.style.opacity = '0';
  idle.style.opacity = '0';
  loader.style.display = 'flex';

  /* Parallel: AI wisdom + image pre-fetch */
  const seed = Math.floor(Math.random()*999983);
  const imgUrl = 'https://pollinations.ai/p/'
    + encodeURIComponent(q + ', vedic sacred art, lotus mandala, golden divine light, cosmos india temple')
    + '?width=800&height=900&seed=' + seed + '&nologo=true&turbo=true';

  const [aiRes, imgRes] = await Promise.allSettled([
    callAI(q),
    waitForImage(imgUrl)
  ]);

  loader.style.display = 'none';

  /* Process AI */
  if(aiRes.status === 'fulfilled' && aiRes.value){
    const d = aiRes.value;
    storedShloka  = (d.shloka  || '').trim();
    storedSource  = (d.source  || '').trim();
    storedInsight = (d.insight || '').trim();
  } else {
    storedShloka  = '';
    storedSource  = '';
    storedInsight = 'Your contemplation of "' + q + '" opens a doorway into the timeless Vedic cosmos. '
      + 'The Rishis remind us: the seeker who turns within with sincerity will always find the path '
      + 'illuminated by the light of Dharma. Hold this Sankalpa in still awareness.';
    if(aiRes.reason){
      console.warn('AI error:', aiRes.reason);
      showErr('Could not reach the oracle — showing timeless wisdom instead.');
    }
  }

  /* Render shloka */
  const shWrap = document.getElementById('shloka-wrap');
  if(storedShloka){
    document.getElementById('shloka-txt').textContent = storedShloka;
    document.getElementById('shloka-src').textContent = storedSource;
    shWrap.style.display = 'block';
  } else {
    shWrap.style.display = 'none';
  }

  /* Type insight */
  const insEl = document.getElementById('ins-body');
  insEl.innerHTML = '';
  result.classList.add('on');
  await typeOut(insEl, storedInsight);
  actRow.style.display = 'flex';

  /* Show image */
  if(imgRes.status === 'fulfilled'){
    art.src = imgUrl;
    setTimeout(() => { art.style.opacity = '.52'; }, 50);
  }

  pushHistory(q);
  btn.disabled = false;
  running = false;
}

/* ══════ PRELOAD IMAGE ══════ */
function waitForImage(url){
  return new Promise((ok, fail) => {
    const img = new Image();
    img.onload  = () => ok(url);
    img.onerror = () => fail(new Error('image-failed'));
    img.src = url;
  });
}

/* ══════ CLAUDE API ══════ */
async function callAI(query){
  const SYS = `You are BODHA — a sacred oracle bridging Vedic wisdom and the modern seeker.
Respond ONLY with a valid JSON object. No markdown. No fences. No explanation. No preamble.

Exact format:
{"shloka":"<Sanskrit verse in Devanagari Unicode>","source":"<scripture chapter/verse>","insight":"<2-3 sentences, second person, poetic, luminous, weave Sanskrit terms naturally>"}

Rules:
- shloka: verified Devanagari, directly relevant to the query
- source: e.g. "Bhagavad Gita 2.47" or "Rigveda 1.1.1"
- insight: second person, no cliches, luminous tone
- Output ONLY the JSON — nothing else`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-5',
      max_tokens: 600,
      system: SYS,
      messages: [{ role: 'user', content: query }]
    })
  });

  if(!res.ok){
    const body = await res.text().catch(()=>'');
    throw new Error('HTTP ' + res.status + ': ' + body);
  }

  const data = await res.json();
  const raw = data.content
    .filter(b => b.type === 'text')
    .map(b => b.text)
    .join('');

  /* Strip accidental markdown fences */
  const clean = raw.replace(/^```[\w]*\s*/,'').replace(/\s*```$/,'').trim();
  return JSON.parse(clean);
}

/* ══════ TYPEWRITER ══════ */
function typeOut(el, text){
  el.innerHTML = '';
  const SPEED = 15;
  return new Promise(done => {
    let i = 0;
    function tick(){
      if(i < text.length){
        i++;
        el.innerHTML = hl(text.slice(0,i)) + '<span class="caret" aria-hidden="true"></span>';
        setTimeout(tick, SPEED);
      } else {
        el.innerHTML = hl(text);
        done();
      }
    }
    tick();
  });
}

/* ══════ HIGHLIGHT SANSKRIT TERMS ══════ */
const TERMS = [
  'Atman','Brahman','Dharma','Karma','Moksha','Rta',
  'Sattva','Tamas','Rajas','Prakriti','Purusha','Maya',
  'Ahimsa','Yoga','Jnana','Bhakti','Shakti','Prana',
  'Samadhi','Turiya','Vedanta','Advaita','Sankalpa',
  'Vasanas','Samsara','Chitta','Anicca','Nirvana',
  'Tat Tvam Asi','Aham Brahmasmi','Sat Chit Ananda','Neti Neti'
];
const TERMS_RE = new RegExp('\\b(' + TERMS.join('|') + ')\\b', 'g');
function hl(t){ return t.replace(TERMS_RE, '<strong>$1</strong>'); }

/* ══════ ERROR ══════ */
function showErr(msg){
  const el = document.getElementById('err-box');
  el.textContent = '⚠ ' + msg;
  el.style.display = 'block';
}

/* ══════ ACTION BUTTONS ══════ */
async function doCopy(){
  const lines = [];
  if(storedShloka){ lines.push(storedShloka, '— ' + storedSource, ''); }
  lines.push(storedInsight);
  const text = lines.join('\n');
  const btn = document.getElementById('copy-btn');

  try {
    await navigator.clipboard.writeText(text);
  } catch {
    /* fallback */
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); ta.remove();
  }
  btn.innerHTML = `<svg viewBox="0 0 16 16" fill="currentColor"><path d="M13.854 3.646a.5.5 0 0 1 0 .708l-7 7a.5.5 0 0 1-.708 0l-3.5-3.5a.5.5 0 1 1 .708-.708L6.5 10.293l6.646-6.647a.5.5 0 0 1 .708 0z"/></svg> Copied!`;
  setTimeout(() => {
    btn.innerHTML = `<svg viewBox="0 0 16 16" fill="currentColor"><path d="M4 2a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V2zm2-1a1 1 0 0 0-1 1v9a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1H6zM2 5a1 1 0 0 0-1 1v9a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1v-1H8v1H2V6h1V5H2z"/></svg> Copy`;
  }, 2200);
}

function doNew(){
  document.getElementById('q').value = '';
  document.getElementById('result').classList.remove('on');
  document.getElementById('art').style.opacity = '0';
  document.getElementById('idle-scr').style.opacity = '0.22';
  document.getElementById('act-row').style.display = 'none';
  document.getElementById('err-box').style.display = 'none';
  document.getElementById('q').focus();
}

async function doShare(){
  const lines = [];
  if(storedShloka){ lines.push(storedShloka, '— ' + storedSource, ''); }
  lines.push(storedInsight, '', '— BODHA · Neural Wisdom · Ancient Soul');
  const text = lines.join('\n');
  const btn = document.getElementById('share-btn');

  if(navigator.share){
    try { await navigator.share({title:'BODHA · Vedic Wisdom', text}); return; } catch{}
  }
  await navigator.clipboard.writeText(text).catch(()=>{});
  btn.textContent = '✓ Link copied';
  setTimeout(() => { btn.innerHTML = `<svg viewBox="0 0 16 16" fill="currentColor"><path d="M13.5 1a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3zM11 2.5a2.5 2.5 0 1 1 .603 1.628l-6.718 3.12a2.499 2.499 0 0 1 0 1.504l6.718 3.12a2.5 2.5 0 1 1-.488.876l-6.718-3.12a2.5 2.5 0 1 1 0-3.256l6.718-3.12A2.5 2.5 0 0 1 11 2.5z"/></svg> Share`; }, 2200);
}
