    <style>
        :root { --gold: #D4AF37; --bg: #050505; --glass: rgba(255, 255, 255, 0.03); }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        .geometry { position: fixed; width: 100%; height: 100%; background: url('https://www.transparenttextures.com/patterns/sacred-geometry.png'); opacity: 0.03; z-index: -1; }
        nav { padding: 20px 6%; border-bottom: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Cinzel Decorative'; color: var(--gold); font-size: 22px; letter-spacing: 4px; }
        main { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; padding: 100px 6%; min-height: 80vh; }
        .glass-card { background: var(--glass); padding: 40px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px); }

        .btn { width: 100%; background: var(--gold); color: #000; border: none; padding: 18px; border-radius: 50px; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
        .viewport { position: relative; border-radius: 30px; overflow: hidden; background: #000; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; min-height: 500px; }
        #art { width: 100%; height: 100%; object-fit: cover; display: none; }
        .loader { text-align: center; display: none; }
        .lotus { width: 50px; height: 50px; border: 2px solid var(--gold); border-radius: 50% 0 50% 0; animation: spin 2s infinite; margin-bottom: 10px; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .overlay { position: absolute; bottom: 0; padding: 30px; background: linear-gradient(transparent, #000 80%); opacity: 0; transition: 0.5s; }
        .overlay.active { opacity: 1; }
        @media (max-width: 900px) { main { grid-template-columns: 1fr; } }
    </style>
</head>
