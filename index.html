<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BODHA | Neural Wisdom. Ancient Soul.</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Inter:wght@300;400;600&family=Noto+Serif+Devanagari:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --bg: #050505; --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.08); }
        * { box-sizing: border-box; margin: 0; padding: 0; cursor: crosshair; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .cosmic-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, #111 0%, #000 100%); z-index: -2; }
        .geometry { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://www.transparenttextures.com/patterns/sacred-geometry.png'); opacity: 0.03; z-index: -1; animation: rotate 180s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        nav { display: flex; justify-content: space-between; padding: 25px 6%; position: fixed; width: 100%; top: 0; backdrop-filter: blur(20px); border-bottom: 1px solid var(--glass-border); z-index: 1000; }
        .logo { font-family: 'Cinzel Decorative'; font-size: 26px; color: var(--gold); letter-spacing: 5px; text-shadow: 0 0 20px rgba(212,175,55,0.3); }
        main { padding: 140px 6% 60px; display: grid; grid-template-columns: 1fr 1.2fr; gap: 50px; min-height: 100vh; }
        .glass-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 35px; padding: 45px; backdrop-filter: blur(40px); box-shadow: 0 30px 60px rgba(0,0,0,0.6); }
        h1 { font-size: 52px; font-family: 'Cinzel Decorative'; margin-bottom: 15px; background: linear-gradient(to right, #fff, var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        textarea { width: 100%; background: transparent; border: none; border-bottom: 1px solid #333; color: #fff; font-size: 19px; padding: 15px 0; margin: 30px 0; outline: none; transition: 0.4s; font-family: 'Inter'; }
        textarea:focus { border-bottom-color: var(--gold); }
        .btn { width: 100%; background: var(--gold); color: #000; border: none; padding: 22px; border-radius: 50px; font-weight: 800; font-size: 14px; text-transform: uppercase; letter-spacing: 4px; transition: 0.4s; box-shadow: 0 15px 40px rgba(212,175,55,0.2); }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 20px 50px rgba(212,175,55,0.4); }
        .viewport { position: relative; border-radius: 40px; overflow: hidden; border: 1px solid var(--glass-border); background: #000; min-height: 600px; display: flex; align-items: center; justify-content: center; }
        #art { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: 1.5s ease-in-out; }
        .overlay { position: absolute; bottom: 0; width: 100%; padding: 50px; background: linear-gradient(transparent, rgba(0,0,0,0.98) 60%); transform: translateY(30px); opacity: 0; transition: 1s; }
        .overlay.active { transform: translateY(0); opacity: 1; }
        .shloka { font-family: 'Noto Serif Devanagari'; font-size: 30px; color: #FF9933; margin-bottom: 20px; text-shadow: 0 0 25px rgba(255,153,51,0.3); }
        .loader { text-align: center; display: none; position: absolute; z-index: 5; }
        .lotus { width: 70px; height: 70px; border: 3px solid var(--gold); border-radius: 50% 0 50% 0; animation: bloom 2.5s infinite ease-in-out; margin: 0 auto; }
        @keyframes bloom { 0%, 100% { transform: rotate(0deg) scale(1); opacity: 0.5; } 50% { transform: rotate(180deg) scale(1.1); opacity: 1; } }
        @media (max-width: 1000px) { main { grid-template-columns: 1fr; } .viewport { height: 450px; } }
    </style>
</head>
<body>
    <div class="cosmic-bg"></div><div class="geometry"></div>
    <nav><div class="logo">BODHA</div><div style="font-size:10px; letter-spacing:3px; color:#555;">SATTVA ENGINE V6.0</div></nav>
    <main>
        <section>
            <h1>Awaken the<br>Ancient.</h1>
            <p style="color:#777; font-weight:300; margin-bottom:40px;">Bridges 5,000 years of Vedic Shastras with Neural Intelligence.</p>
            <div class="glass-card">
                <label style="font-size:10px; color:var(--gold); letter-spacing:4px;">YOUR SANKALPA (INTENTION)</label>
                <textarea id="q" placeholder="Enter a mantra, deity, or philosophical doubt..."></textarea>
                <button class="btn" onclick="run()">Invoke Wisdom</button>
            </div>
        </section>
        <section class="viewport">
            <div id="loader" class="loader"><div class="lotus"></div><p style="color:var(--gold); font-size:10px; margin-top:20px; letter-spacing:4px;">CHURNING THE ETHER...</p></div>
            <img id="art" src=""><div id="ov" class="overlay"><div class="shloka" id="sk"></div><div id="it" style="color:#bbb; font-weight:300; line-height:1.8;"></div></div>
        </section>
    </main>
    <script>
        async function run() {
            const q = document.getElementById('q').value;
            if(!q) return;
            document.getElementById('loader').style.display = 'block';
            document.getElementById('ov').classList.remove('active');
            document.getElementById('art').style.opacity = '0';
            
            const seed = Math.floor(Math.random()*1e6);
            // TURBO OPTIMIZED: 768px for speed + Turbo flag
            const url = `https://pollinations.ai/p/${encodeURIComponent(q + ' vedic spiritual art, 8k, gold accents, divine lighting')}?width=768&height=768&seed=${seed}&nologo=true&turbo=true`;
            
            const img = new Image();
            img.src = url;
            img.onload = () => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('art').src = url;
                document.getElementById('art').style.opacity = '0.7';
                document.getElementById('sk').innerText = "यदा यदा ही धर्मस्य ग्लानिर्भवति भारत |";
                document.getElementById('it').innerHTML = `<b>Neural Insight:</b> Your focus on "${q}" reveals a deeper alignment with Cosmic Order (Rta). The ancient texts confirm that when consciousness seeks truth, the universe provides the path. Hold this vision in your meditation.`;
                document.getElementById('ov').classList.add('active');
            };
        }
    </script>
</body>
</html>
